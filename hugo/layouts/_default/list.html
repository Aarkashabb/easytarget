{{ define "main" }}
<section class="portfolio-hero">
  <div class="container">
    <h1>{{ .Title }}</h1>
  </div>
</section>
<section class="section" style="background: var(--c-bg);">
  <div class="container">
    {{ range .Pages }}
    <p><a href="{{ .RelPermalink }}">{{ .Title }}</a></p>
    {{ end }}
  </div>
</section>
{{ end }}
{{ define "scripts" }}
{{- $js := resources.Get "js/site.js" | resources.Fingerprint "sha256" }}
<script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}" defer></script>
{{ end }}
