[build]
  base    = "hugo"
  command = "hugo --minify"
  publish = "public"

[build.environment]
  HUGO_VERSION        = "0.132.0"
  HUGO_ENV            = "production"
  HUGO_ENABLEGITINFO  = "true"

[[redirects]]
  from   = "/admin"
  to     = "/admin/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
